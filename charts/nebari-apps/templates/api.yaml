{{- if .Values.api.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nebari-apps.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
---
# The API writes App CRs and reads their children for observability.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nebari-apps.fullname" . }}-api
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps.nebari.dev"]
    resources: ["apps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Roll app pods on demand (POST /apps/{ns}/{name}/restart).
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  # Read instantaneous pod usage (GET /apps/{ns}/{name}/metrics).
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nebari-apps.fullname" . }}-api
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nebari-apps.fullname" . }}-api
subjects:
  - kind: ServiceAccount
    name: {{ include "nebari-apps.fullname" . }}-api
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nebari-apps.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "nebari-apps.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "nebari-apps.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "nebari-apps.fullname" . }}-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: APPS_DOMAIN
              value: {{ include "nebari-apps.appsDomain" . }}
            {{- with .Values.api.allowedNamespaces }}
            - name: APPS_NAMESPACES
              value: {{ join "," . | quote }}
            {{- end }}
            - name: AUTH_ENABLED
              value: {{ .Values.api.auth.enabled | quote }}
            - name: TLS_DISABLED
              value: {{ not .Values.tls.enabled | quote }}
            {{- if .Values.api.auth.enabled }}
            - name: OIDC_ISSUER
              value: {{ printf "%s/realms/%s" (required "keycloak.url is required when api.auth.enabled" .Values.keycloak.url | trimSuffix "/") .Values.keycloak.realm }}
            {{- with .Values.keycloak.internalUrl }}
            - name: OIDC_ISSUER_INTERNAL
              value: {{ printf "%s/realms/%s" (. | trimSuffix "/") $.Values.keycloak.realm }}
            {{- end }}
            - name: UI_KEYCLOAK_URL
              value: {{ .Values.keycloak.url }}
            - name: UI_KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm }}
            # The SPA client is provisioned by the UI's NebariApp; the client
            # id is written into its OIDC secret.
            - name: UI_KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebari-apps.fullname" . }}-ui-oidc-client
                  key: spa-client-id
                  optional: true
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebari-apps.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-apps.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "nebari-apps.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
{{- end }}
